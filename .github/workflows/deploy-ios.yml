name: Deploy iOS to TestFlight

# Runs on merges to master that touch Flutter code or this workflow.
# macOS runner required to build iOS apps.
# Secrets required:
#   DISTRIBUTION_CERTIFICATE_BASE64  — .p12 cert, base64-encoded
#   DISTRIBUTION_CERTIFICATE_PASSWORD — password set when exporting .p12
#   APP_STORE_CONNECT_API_KEY_BASE64  — AuthKey_88R6NGQ7J4.p8, base64-encoded
#   FLUTTER_SENTRY_DSN               — Sentry DSN for the Flutter project

on:
  push:
    branches: [master]
    paths:
      - 'flutter/**'
      - '!flutter/integration_test/**'
      - '!flutter/test/**'
  workflow_dispatch:

jobs:
  deploy-ios:
    name: Build & upload to TestFlight
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.pip-cache
          key: pip-cache-appstore-connect

      - name: Create .env file from secrets
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ vars.API_BASE_URL }}
          AUTH_ENABLED=true
          EOF
        working-directory: flutter

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: flutter


      - name: Bump build number
        # Sets version to current pubspec version + CI run number as build number.
        # e.g. 1.0.0+1 → 1.0.0+42
        run: |
          python3 - <<'EOF'
          import re, os, pathlib
          pubspec = pathlib.Path("pubspec.yaml")
          content = pubspec.read_text()
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          content = re.sub(
              r'^(version:\s*\d+\.\d+\.\d+)\+\d+',
              rf'\1+{run_number}',
              content,
              flags=re.MULTILINE,
          )
          pubspec.write_text(content)
          print(f"Build number set to {run_number}")
          EOF
        working-directory: flutter
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Import Distribution Certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert
          security import "$CERT_PATH" \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add to search list so xcodebuild can find it
          security list-keychain -d user -s "$KEYCHAIN_PATH"
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_88R6NGQ7J4.p8
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

      - name: Enable FFmpeg for production
        run: ./scripts/toggle_ffmpeg.sh enable

      - name: Update CocoaPods
        # Updates Sentry pod to match sentry_flutter's requirements and refreshes
        # Podfile.lock. Needed when Dependabot bumps sentry_flutter to a version
        # that requires a newer Sentry/HybridSDK than what's pinned in Podfile.lock.
        run: pod update Sentry
        working-directory: flutter/ios

      - name: Build Flutter iOS (no codesign)
        # --dart-define injects Sentry DSN at compile time (String.fromEnvironment).
        # Without this, SENTRY_DSN is empty and Sentry silently does nothing.
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SENTRY_DSN=${{ secrets.FLUTTER_SENTRY_DSN }} \
            --dart-define=ENV=production
        working-directory: flutter

      - name: Install provisioning profile
        run: |
          # Must run BEFORE archive — xcodebuild needs the profile on disk to resolve it.
          pip3 install --quiet --break-system-packages --cache-dir ~/.pip-cache requests pyjwt cryptography
          python3 - <<'PYEOF'
          import jwt, time, requests, os, pathlib, uuid, base64

          key_id = "88R6NGQ7J4"
          issuer_id = "2e175de1-26c8-4f2e-91fb-2ece7aba0b12"
          key_path = pathlib.Path.home() / ".appstoreconnect/private_keys/AuthKey_88R6NGQ7J4.p8"

          private_key = key_path.read_text()
          now = int(time.time())
          payload = {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id})

          headers = {"Authorization": f"Bearer {token}"}
          resp = requests.get(
              "https://api.appstoreconnect.apple.com/v1/profiles?filter[profileState]=ACTIVE&filter[profileType]=IOS_APP_STORE&limit=50",
              headers=headers
          )
          resp.raise_for_status()

          profiles_dir = pathlib.Path.home() / "Library/MobileDevice/Provisioning Profiles"
          profiles_dir.mkdir(parents=True, exist_ok=True)

          for profile in resp.json()["data"]:
              name = profile["attributes"]["name"]
              content = base64.b64decode(profile["attributes"]["profileContent"])
              profile_uuid = profile["attributes"]["uuid"]
              out = profiles_dir / f"{profile_uuid}.mobileprovision"
              out.write_bytes(content)
              print(f"Installed: {name} -> {out}")
          PYEOF

      - name: Archive (Distribution signing — embeds entitlements)
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="AI WOD Timer App Store" \
            DEVELOPMENT_TEAM=X4J5J2543A
        working-directory: flutter/ios

      - name: Export IPA (signs with installed provisioning profile)
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist ios/ExportOptions.plist
        working-directory: flutter

      - name: Verify entitlements in IPA
        run: |
          IPA=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          unzip -q "$IPA" -d "$RUNNER_TEMP/ipa_verify"
          echo "=== Embedded entitlements ==="
          codesign -d --entitlements :- "$RUNNER_TEMP/ipa_verify/Payload/Runner.app" 2>&1
          if ! codesign -d --entitlements :- "$RUNNER_TEMP/ipa_verify/Payload/Runner.app" 2>&1 | grep -q "applesignin"; then
            echo "ERROR: com.apple.developer.applesignin entitlement is MISSING from IPA!"
            rm -rf "$RUNNER_TEMP/ipa_verify"
            exit 1
          fi
          echo "OK: com.apple.developer.applesignin entitlement is present"
          rm -rf "$RUNNER_TEMP/ipa_verify"

      - name: Upload to TestFlight
        run: |
          IPA=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey 88R6NGQ7J4 \
            --apiIssuer 2e175de1-26c8-4f2e-91fb-2ece7aba0b12

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ TestFlight deploy failed\",
                \"description\": \"**Commit:** ${{ github.sha }}\n**[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**\",
                \"color\": 15158332
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
