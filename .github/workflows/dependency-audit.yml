name: Dependency Audit

on:
  push:
    branches: [master]
    paths:
      - 'flutter/pubspec.yaml'
      - 'flutter/pubspec.lock'
      - 'backend/requirements.txt'
  schedule:
    - cron: '0 9 * * 6'  # Every Saturday at 9am UTC
  workflow_dispatch:

jobs:
  flutter-audit:
    name: Flutter security audit
    runs-on: ubuntu-latest
    env:
      OSV_SCANNER_VERSION: "2.0.2"  # https://github.com/google/osv-scanner/releases
    steps:
      - uses: actions/checkout@v5

      - name: Install osv-scanner
        run: |
          curl -sL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Scan Flutter dependencies
        run: osv-scanner scan --lockfile=flutter/pubspec.lock

  python-audit:
    name: Python security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Security audit
        run: pip-audit -r requirements.txt
        working-directory: backend

  notify-failure:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    needs: [flutter-audit, python-audit]
    if: false  # disabled during testing
    steps:
      - name: Send Discord alert
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"⚠️ Dependency audit failed\",
                \"description\": \"A security vulnerability or audit failure was detected.\n**[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**\",
                \"color\": 15158332
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
