apiVersion: 1

groups:
  - orgId: 1
    name: security
    folder: AI WOD Timer Alerts
    interval: 1m
    rules:
      - uid: brute-force-detected
        title: BruteForceDetected
        condition: C
        for: 0s
        labels:
          severity: critical
          owner: backend
        annotations:
          summary: "Brute-force: {{ $values.C.Value }} auth failures/min"
          runbook: >
            1. Identify offending IP in Loki: {job="backend", event="auth.failure"}
            2. Block IP at load balancer / firewall
            3. Check for compromised accounts
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: increase(security_auth_failures_total[1m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
