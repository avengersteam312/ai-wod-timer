repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5  # keep in sync with CI (backend/ruff.toml + pr-check.yml)
    hooks:
      - id: ruff
        args: [--fix]  # auto-fix what it can; unfixable issues block the commit
      - id: ruff-format
  - repo: local
    hooks:
      - id: backend-pytest-fast
        name: backend pytest fast
        entry: scripts/pre_commit_checks.sh backend_pytest
        language: system
        pass_filenames: false
        files: ^backend/
      - id: flutter-test-fast
        name: flutter test fast
        entry: scripts/pre_commit_checks.sh flutter_test
        language: system
        pass_filenames: false
        files: ^flutter/(lib|test|pubspec\.yaml|pubspec\.lock)
      - id: flutter-analyze
        name: flutter analyze
        entry: scripts/pre_commit_checks.sh flutter_analyze
        language: system
        pass_filenames: false
        files: ^flutter/
