name: ai_wod_timer
description: AI-powered workout timer app with cross-platform support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0
  http_parser: ^4.0.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Supabase
  supabase_flutter: ^2.3.4

  # Audio
  audioplayers: ^5.2.1
  audio_session: ^0.1.21
  path_provider: ^2.1.2

  # Screen Wake Lock
  wakelock_plus: ^1.1.4

  # Local Database for Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2

  # Image Picker
  image_picker: ^1.0.7

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Video Recording
  camera: ^0.11.0+2
  video_player: ^2.9.2
  share_plus: ^10.0.0
  gallery_saver_plus: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/voice/
    - .env
