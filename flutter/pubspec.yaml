name: ai_wod_timer
description: AI-powered workout timer app with cross-platform support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0
  http_parser: ^4.0.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Supabase
  supabase_flutter: ^2.3.4

  # Google Sign In
  google_sign_in: ^7.2.0

  # Apple Sign In
  sign_in_with_apple: ^7.0.1

  # URL Launcher (for OAuth)
  url_launcher: ^6.2.5

  # Audio
  audioplayers: ^6.6.0
  audio_session: ^0.2.3
  path_provider: ^2.1.2

  # Screen Wake Lock
  wakelock_plus: ^1.1.4

  # Local Database for Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Image picking (camera / gallery)
  image_picker: ^1.0.7

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  package_info_plus: ^8.3.0

  # Deep Links (for manual auth callback handling)
  app_links: ^6.4.1

  # Environment Variables
  flutter_dotenv: ^6.0.0

  # Observability
  sentry_flutter: ^9.15.0

  # Video Recording
  camera: ^0.12.0
  video_player: ^2.9.2
  share_plus: ^12.0.1
  gallery_saver_plus: ^3.0.0

  # Video Processing (timer overlay baking)
  # Using community fork since original ffmpeg_kit was discontinued April 2025
  # NOTE: Commented out for simulator testing - FFmpeg Kit doesn't support iOS simulator
  # Uncomment for device builds: ffmpeg_kit_flutter_new: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  connectivity_plus_platform_interface: ^2.0.1
  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  plugin_platform_interface: ^2.1.8

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/app_icon_1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/voice/
    - assets/fonts/
    - .env
